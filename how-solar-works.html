<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>True Solar Advisor | Tampa Solar Review</title>
  <meta
    name="description"
    content="Tampa homeowners can get a clear, no-pressure solar review to see if solar could lower their electric bill. Local guidance, real numbers, and a premium experience."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-strong: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --muted-soft: #64748b;
      --line: rgba(15, 23, 42, 0.08);
      --line-strong: rgba(15, 23, 42, 0.14);
      --accent: #0ea5e9;
      --accent-dark: #0284c7;
      --accent-soft: rgba(14, 165, 233, 0.12);
      --success: #16a34a;
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent 24%),
        linear-gradient(180deg, #fbfdff 0%, #f5f7fb 28%, #eef3f9 100%);
      line-height: 1.55;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .site-shell {
      padding: 20px 0 72px;
    }

    .nav {
      position: sticky;
      top: 16px;
      z-index: 50;
      margin-bottom: 18px;
    }

    .nav-inner {
      display: grid;
      grid-template-columns: minmax(300px, 1fr) auto;
      align-items: center;
      gap: 18px;
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      border-radius: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
      flex-shrink: 0;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-copy strong {
      display: block;
      font-size: 0.98rem;
      letter-spacing: -0.02em;
    }

    .brand-copy span {
      display: block;
      color: var(--muted-soft);
      font-size: 0.84rem;
      max-width: 460px;
      line-height: 1.25;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 0;
    }

    .nav-links a {
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.95rem;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .nav-links a:hover { background: rgba(255,255,255,0.72); color: var(--text); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 600;
      font-size: 0.98rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      box-shadow: 0 16px 36px rgba(37, 99, 235, 0.28);
    }

    .btn-primary:hover {
      box-shadow: 0 18px 40px rgba(37, 99, 235, 0.34);
    }

    .btn-secondary {
      color: var(--text);
      border-color: var(--line);
      background: rgba(255,255,255,0.74);
      backdrop-filter: blur(12px);
    }

    .hero {
      padding: 28px 0 20px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(360px, 0.92fr);
      gap: 26px;
      align-items: stretch;
    }

    .glass-card {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: var(--radius-xl);
    }

    .hero-panel {
      padding: 42px;
      position: relative;
      overflow: hidden;
      min-height: 640px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero-panel::before {
      content: "";
      position: absolute;
      inset: auto auto -60px -40px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14,165,233,0.16), transparent 68%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(255,255,255,0.96);
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 600;
      width: fit-content;
      box-shadow: 0 10px 24px rgba(15,23,42,0.06);
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 6px rgba(22, 163, 74, 0.10);
    }

    h1 {
      margin: 18px 0 16px;
      font-size: clamp(2.5rem, 4vw, 4.6rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
      max-width: 12ch;
    }

    .hero-copy {
      margin: 0;
      max-width: 58ch;
      font-size: 1.08rem;
      color: var(--muted);
    }

    .hero-actions {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .trust-row {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .trust-chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.96);
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 500;
      box-shadow: 0 10px 24px rgba(15,23,42,0.04);
    }

    .hero-metrics {
      margin-top: 34px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .metric {
      padding: 18px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(255,255,255,0.88);
      border-radius: 18px;
    }

    .metric strong {
      display: block;
      font-size: 1.32rem;
      letter-spacing: -0.04em;
      margin-bottom: 4px;
    }

    .metric span {
      color: var(--muted-soft);
      font-size: 0.92rem;
    }

    .form-card {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 640px;
      position: relative;
      overflow: hidden;
    }

    .form-card::before {
      content: "";
      position: absolute;
      top: -80px;
      right: -60px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.14), transparent 65%);
      pointer-events: none;
    }

    .form-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .form-title {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
    }

    .form-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .rating-card {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(255,255,255,0.98);
      min-width: 132px;
      text-align: right;
      box-shadow: 0 10px 24px rgba(15,23,42,0.04);
    }

    .rating-card strong {
      display: block;
      font-size: 1.2rem;
      letter-spacing: -0.04em;
    }

    .rating-card span {
      color: var(--muted-soft);
      font-size: 0.84rem;
    }

    .steps {
      display: grid;
      gap: 10px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(255,255,255,0.94);
    }

    .step-num {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(14,165,233,0.12), rgba(37,99,235,0.2));
      color: var(--accent-dark);
      display: grid;
      place-items: center;
      font-weight: 800;
      flex-shrink: 0;
    }

    .step p {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 4px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.9);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(14,165,233,0.4);
      box-shadow: 0 0 0 5px rgba(14,165,233,0.12);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .fine-print {
      margin: 0;
      color: var(--muted-soft);
      font-size: 0.84rem;
    }

    .section {
      padding: 26px 0;
    }

    .split-section {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: 26px;
      align-items: stretch;
    }

    .section-card {
      padding: 34px;
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.86);
      box-shadow: 0 18px 50px rgba(15,23,42,0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .kicker {
      margin: 0 0 12px;
      color: var(--accent-dark);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.78rem;
      font-weight: 800;
    }

    h2 {
      margin: 0 0 14px;
      font-size: clamp(1.9rem, 3vw, 3rem);
      letter-spacing: -0.05em;
      line-height: 1.02;
    }

    .section-card p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 1rem;
    }

    .bullet-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
    }

    .bullet-card {
      padding: 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.96);
    }

    .bullet-card strong {
      display: block;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
      font-size: 1rem;
    }

    .bullet-card p {
      margin: 0;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .mini-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .mini-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .mini-item:last-child { border-bottom: 0; padding-bottom: 0; }

    .mini-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-weight: 800;
    }

    .mini-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.98rem;
      letter-spacing: -0.02em;
    }

    .mini-item p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .about-grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 26px;
      align-items: center;
    }

    .portrait-card {
      border-radius: var(--radius-xl);
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.72));
      border: 1px solid rgba(255,255,255,0.96);
      box-shadow: 0 18px 50px rgba(15,23,42,0.1);
      min-height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .portrait-frame {
      width: 100%;
      height: 100%;
      min-height: 324px;
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(135deg, #ffffff, #eef4ff);
      display: block;
    }

    .portrait-frame img {
      width: 100%;
      height: 100%;
      min-height: 324px;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
    }

    .stat {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.96);
    }

    .stat strong {
      display: block;
      font-size: 1.4rem;
      letter-spacing: -0.04em;
      margin-bottom: 4px;
    }

    .stat span {
      color: var(--muted-soft);
      font-size: 0.9rem;
    }

    .qualification-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
    }

    .qual-card {
      padding: 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.96);
    }

    .qual-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .qual-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .resource-bar {
      padding: 18px 22px;
      border-radius: 24px;
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,255,255,0.68));
      border: 1px solid rgba(255,255,255,0.96);
      box-shadow: 0 18px 50px rgba(15,23,42,0.08);
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .resource-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .resource-links a {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(255,255,255,0.96);
      color: var(--text);
      font-weight: 500;
    }

    .cta-band {
      padding: 34px;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, rgba(14,165,233,0.92), rgba(37,99,235,0.92));
      color: white;
      box-shadow: 0 22px 60px rgba(37,99,235,0.26);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
    }
